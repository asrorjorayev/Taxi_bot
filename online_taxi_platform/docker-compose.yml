services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-online_taxi}
      POSTGRES_USER: ${POSTGRES_USER:-online_taxi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-online_taxi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-bookworm
    ports:
      - "6379:6379"

  web:
    image: python:3.11-slim
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  bot:
    image: python:3.11-slim
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && python -m bot.main"
    depends_on:
      - postgres
      - redis

  celery_worker:
    image: python:3.11-slim
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && celery -A config.celery worker -l INFO"
    depends_on:
      - postgres
      - redis

  celery_beat:
    image: python:3.11-slim
    working_dir: /app
    env_file: .env
    volumes:
      - .:/app
    command: sh -c "pip install -r requirements.txt && celery -A config.celery beat -l INFO"
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
